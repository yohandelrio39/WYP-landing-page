<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 28px 32px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .head .t { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg); font-weight: 600; }
  .head .d { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; }
  .item { display: flex; flex-direction: column; gap: 12px; }
  .surf { background: #FFFFFF; height: 80px; }
  .e0 { box-shadow: none; border: 1px solid var(--line); }
  .e1 { box-shadow: 0 1px 0 0 rgba(11,11,12,0.04); }
  .e2 { box-shadow: 0 8px 24px -12px rgba(11,11,12,0.18); }
  .e3 { box-shadow: 0 24px 60px -24px rgba(11,11,12,0.35); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg); }
  .ctx { font-size: 10px; color: var(--fg-3); letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .note { margin-top: 22px; font-size: 11px; color: var(--fg-3); line-height: 1.4; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head"><div class="t">Elevation</div><div class="d">Used sparingly — structure over depth</div></div>
    <div class="grid">
      <div class="item"><div class="surf e0"></div><div class="lbl">--shadow-0</div><div class="ctx">Flat · default</div></div>
      <div class="item"><div class="surf e1"></div><div class="lbl">--shadow-1</div><div class="ctx">Hairline · sticky bar</div></div>
      <div class="item"><div class="surf e2"></div><div class="lbl">--shadow-2</div><div class="ctx">Menus · popovers</div></div>
      <div class="item"><div class="surf e3"></div><div class="lbl">--shadow-3</div><div class="ctx">Modal · overlay</div></div>
    </div>
    <div class="note">No inner shadows. No neumorphism. Shadows are monochrome and only express elevation, never depth-as-decoration.</div>
  </div>
</body>
</html>
