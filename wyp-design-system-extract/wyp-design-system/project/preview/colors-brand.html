<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Brand Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .palette { display: grid; grid-template-columns: 1.4fr 1fr 1fr; min-height: 280px; }
  .chip { padding: 24px 28px; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
  .chip .name { font-size: 28px; letter-spacing: -0.01em; font-weight: 500; line-height: 1; }
  .chip .role { font-size: 10px; letter-spacing: var(--tracking-caps); text-transform: uppercase; opacity: 0.75; }
  .chip .codes { display: flex; flex-direction: column; gap: 4px; }
  .chip .codes span { font-family: var(--font-mono); font-size: 11px; opacity: 0.8; }
  .noir { background: #0B0B0C; color: #F5F5F5; }
  .argent { background: #A3A3A3; color: #0B0B0C; }
  .blanc { background: #F5F5F5; color: #0B0B0C; border-left: 1px solid var(--line); }
  .label-tag { font-size: 9px; letter-spacing: var(--tracking-caps); text-transform: uppercase; opacity: 0.65; }
</style>
</head>
<body>
  <div class="palette">
    <div class="chip noir">
      <div>
        <div class="label-tag">Primaire · Structure & encrage</div>
      </div>
      <div class="name">Noir</div>
      <div class="codes">
        <span>HEX #0B0B0C</span>
        <span>RGB 11 · 11 · 12</span>
        <span>CMYK 0 / 0 / 0 / 95</span>
      </div>
    </div>
    <div class="chip argent">
      <div><div class="label-tag">Secondaire · Détail & nuance</div></div>
      <div class="name">Argent</div>
      <div class="codes">
        <span>HEX #A3A3A3</span>
        <span>RGB 163 · 163 · 163</span>
      </div>
    </div>
    <div class="chip blanc">
      <div><div class="label-tag">Contraste & lisibilité</div></div>
      <div class="name">Blanc</div>
      <div class="codes">
        <span>HEX #F5F5F5</span>
        <span>RGB 245 · 245 · 245</span>
      </div>
    </div>
  </div>
</body>
</html>
