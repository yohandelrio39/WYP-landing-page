<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Logo Marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .row { display: grid; grid-template-columns: 1fr 1fr; }
  .panel { padding: 36px 40px; min-height: 280px; display: flex; flex-direction: column; justify-content: space-between; }
  .panel.dark { background: var(--wyp-noir); color: var(--wyp-blanc); }
  .panel.light { background: var(--wyp-blanc); border-right: 1px solid var(--line); }
  .marks { display: flex; align-items: center; gap: 40px; flex: 1; }
  .marks .lg { width: 96px; height: 96px; }
  .marks .md { width: 64px; height: 64px; }
  .marks .sm { width: 36px; height: 36px; }
  .marks .xs { width: 20px; height: 20px; }
  .marks img { width: 100%; height: 100%; object-fit: contain; }
  .label { font-size: 10px; letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .panel.light .label { color: var(--fg-3); }
  .panel.dark .label { color: var(--wyp-argent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border-top: 1px solid var(--line); }
  .row2 .swatch { padding: 18px 24px; display: flex; align-items: center; gap: 14px; border-right: 1px solid var(--line); }
  .row2 .swatch:last-child { border-right: 0; }
  .row2 .swatch img { width: 36px; height: 36px; object-fit: contain; }
  .swatch-meta b { display: block; font-weight: 600; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg); }
  .swatch-meta span { font-size: 10px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="panel light">
      <div class="label">1.2 · Logomark — "Horizon"</div>
      <div class="marks">
        <div class="lg"><img src="../assets/logos/WYP_ICON_NOIR.png" alt="WYP icon"></div>
        <div class="md"><img src="../assets/logos/WYP_ICON_NOIR.png" alt=""></div>
        <div class="sm"><img src="../assets/logos/WYP_ICON_NOIR.png" alt=""></div>
        <div class="xs"><img src="../assets/logos/WYP_ICON_NOIR.png" alt=""></div>
      </div>
      <div class="label">A horizontal bar + a half-circle — a horizon line.</div>
    </div>
    <div class="panel dark">
      <div class="label">Inverse · on noir</div>
      <div class="marks">
        <div class="lg"><img src="../assets/logos/WYP_ICON_BLANC.png" alt="WYP icon"></div>
        <div class="md"><img src="../assets/logos/WYP_ICON_BLANC.png" alt=""></div>
        <div class="sm"><img src="../assets/logos/WYP_ICON_BLANC.png" alt=""></div>
        <div class="xs"><img src="../assets/logos/WYP_ICON_BLANC.png" alt=""></div>
      </div>
      <div class="label">Monochrome noir or blanc only — no fills, no effects.</div>
    </div>
  </div>
  <div class="row2">
    <div class="swatch">
      <img src="../assets/logos/WYP_ICON_NOIR.png" alt="">
      <div class="swatch-meta"><b>Noir</b><span>#0B0B0C</span></div>
    </div>
    <div class="swatch">
      <img src="../assets/logos/WYP_ICON_BLANC.png" alt="" style="background:var(--wyp-noir);padding:4px;">
      <div class="swatch-meta"><b>Blanc</b><span>#F5F5F5</span></div>
    </div>
    <div class="swatch">
      <img src="../assets/logos/WYP_ICON_ARGENT.png" alt="">
      <div class="swatch-meta"><b>Argent</b><span>silver / printed only</span></div>
    </div>
  </div>
</body>
</html>
