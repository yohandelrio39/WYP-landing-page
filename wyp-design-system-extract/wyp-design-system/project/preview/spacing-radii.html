<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 28px 32px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .head .t { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg); font-weight: 600; }
  .head .d { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .swatch { width: 92px; height: 60px; background: var(--fg); }
  .item .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg); }
  .item .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .note { margin-top: 18px; font-size: 11px; color: var(--fg-3); line-height: 1.4; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head"><div class="t">Corner radii</div><div class="d">Default = 0 · WYP is squared</div></div>
    <div class="grid">
      <div class="item"><div class="swatch" style="border-radius:0"></div><div class="lbl">--radius-0</div><div class="px">0px · default</div></div>
      <div class="item"><div class="swatch" style="border-radius:2px"></div><div class="lbl">--radius-sm</div><div class="px">2px · inputs</div></div>
      <div class="item"><div class="swatch" style="border-radius:4px"></div><div class="lbl">--radius-md</div><div class="px">4px · menus</div></div>
      <div class="item"><div class="swatch" style="width:92px;height:32px;border-radius:999px"></div><div class="lbl">--radius-lg</div><div class="px">pill · chips only</div></div>
    </div>
    <div class="note">Cards, panels, buttons, modals all use radius 0. Pill capsules are reserved for collaboration tags &amp; numbered-series chips.</div>
  </div>
</body>
</html>
