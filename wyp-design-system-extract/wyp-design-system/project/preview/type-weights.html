<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — BDO Grotesk Weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 24px 28px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .head .t { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg); font-weight: 600; }
  .head .d { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
  .ladder { display: grid; grid-template-columns: 140px 1fr 60px; align-items: baseline; row-gap: 10px; column-gap: 16px; }
  .lbl { font-size: 11px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
  .spec { font-size: 34px; line-height: 1; color: var(--fg); }
  .num { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .ladder .working { color: var(--fg); }
  .ladder .working::after { content: "·"; margin-left: 8px; color: var(--fg-3); }
  .ladder .working::before { content: ""; }
  .working-flag { font-size: 9px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-mute); padding-left: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head"><div class="t">BDO Grotesk</div><div class="d">7 weights · italics not used</div></div>
    <div class="ladder">
      <span class="lbl">Light</span><span class="spec" style="font-weight:300">Watch Your Passion</span><span class="num">300</span>
      <span class="lbl">Regular</span><span class="spec" style="font-weight:400">Watch Your Passion</span><span class="num">400</span>
      <span class="lbl">Medium <span class="working-flag">Default</span></span><span class="spec" style="font-weight:500">Watch Your Passion</span><span class="num">500</span>
      <span class="lbl">DemiBold <span class="working-flag">Headings</span></span><span class="spec" style="font-weight:600">Watch Your Passion</span><span class="num">600</span>
      <span class="lbl">Bold</span><span class="spec" style="font-weight:700">Watch Your Passion</span><span class="num">700</span>
      <span class="lbl">ExtraBold</span><span class="spec" style="font-weight:800">Watch Your Passion</span><span class="num">800</span>
      <span class="lbl">Black</span><span class="spec" style="font-weight:900">Watch Your Passion</span><span class="num">900</span>
    </div>
  </div>
</body>
</html>
