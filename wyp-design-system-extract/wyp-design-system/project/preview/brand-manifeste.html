<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Manifeste</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--wyp-noir); color: var(--wyp-blanc); }
  .wrap { padding: 36px 40px; display: grid; grid-template-columns: 80px 1fr 120px; gap: 32px; align-items: start; min-height: 320px; }
  .left { display: flex; flex-direction: column; gap: 6px; }
  .left .num { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: var(--wyp-argent); }
  .left .lbl { font-size: 10px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--wyp-argent); }
  .body { font-weight: 500; font-size: 22px; line-height: 1.25; letter-spacing: -0.005em; color: var(--wyp-blanc); }
  .body em { font-style: normal; color: var(--wyp-argent); }
  .sign { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--wyp-blanc); font-weight: 600; margin-top: 18px; }
  .right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .right img { width: 80px; }
  .right .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; color: var(--wyp-argent); text-transform: uppercase; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="num">15</div>
      <div class="lbl">Manifeste</div>
    </div>
    <div>
      <div class="body">
        Nous ne portons pas le temps.<br>
        Nous portons ce qui nous anime.<br>
        <em>La passion ne se collectionne pas. Elle s'assume.</em><br>
        WYP transforme cette énergie en précision.
      </div>
      <div class="sign">Watch Your Passion.</div>
    </div>
    <div class="right">
      <img src="../assets/logos/WYP_ICON_BLANC.png" alt="WYP icon">
      <div class="tag">[GENEVE]</div>
      <div class="tag">[2026]</div>
    </div>
  </div>
</body>
</html>
