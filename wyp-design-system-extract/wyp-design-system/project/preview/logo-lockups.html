<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Logo Lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .card { padding: 28px 32px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; min-height: 240px; }
  .cell { display: flex; flex-direction: column; align-items: stretch; justify-content: space-between; border-right: 1px solid var(--line); padding: 0 24px; }
  .cell:first-child { padding-left: 0; }
  .cell:last-child { border-right: 0; padding-right: 0; }
  .cell .art { flex: 1; display: flex; align-items: center; justify-content: center; padding: 18px 0; }
  .cell .art img { max-width: 100%; max-height: 100px; object-fit: contain; }
  .cell .art.dark { background: var(--wyp-noir); margin: 0 -24px; padding: 18px 24px; }
  .cell:first-child .art.dark { margin-left: 0; padding-left: 0; }
  .cell:last-child .art.dark { margin-right: 0; padding-right: 0; }
  .label { font-size: 10px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); }
  .label .l-num { color: var(--fg); margin-right: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="cell">
      <div class="label"><span class="l-num">1.3</span>Lock-up I · Vertical</div>
      <div class="art"><img src="../assets/logos/WYP_LOCKUP1_NOIR.png" alt="WYP Lockup 1"></div>
      <div class="label">Logotype + signature</div>
    </div>
    <div class="cell">
      <div class="label"><span class="l-num">1.4</span>Lock-up II · Horizontal</div>
      <div class="art"><img src="../assets/logos/WYP_LOCKUP2_NOIR.png" alt="WYP Lockup 2"></div>
      <div class="label">Compact spaces</div>
    </div>
    <div class="cell">
      <div class="label"><span class="l-num">1.5</span>Lock-up III · Icon + Logo</div>
      <div class="art"><img src="../assets/logos/WYP_LOCKUP3_NOIR.png" alt="WYP Lockup 3"></div>
      <div class="label">Asserted brand presence</div>
    </div>
  </div>
</body>
</html>
