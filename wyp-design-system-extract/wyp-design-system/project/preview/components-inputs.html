<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Form Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 28px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 10px; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-3); font-weight: 500; }
  .input, .select {
    font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: var(--fg);
    background: transparent; border: 0; border-bottom: 1px solid var(--fg);
    padding: 10px 0; border-radius: 0; outline: 0;
  }
  .input::placeholder { color: var(--fg-mute); }
  .input:focus { border-bottom-width: 2px; padding-bottom: 9px; }
  .help { font-size: 10px; color: var(--fg-3); }
  .check { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--fg); }
  .check input { appearance: none; width: 14px; height: 14px; border: 1px solid var(--fg); border-radius: 0; margin: 0; display: grid; place-items: center; }
  .check input:checked { background: var(--fg); }
  .check input:checked::after { content: "×"; color: var(--bg); font-size: 13px; line-height: 1; }
  .radio { width: 14px; height: 14px; border: 1px solid var(--fg); border-radius: 999px; appearance: none; margin: 0; position: relative; }
  .radio:checked::after { content: ""; position: absolute; inset: 3px; background: var(--fg); border-radius: 999px; }
  .toggle { width: 36px; height: 18px; border: 1px solid var(--fg); border-radius: 999px; position: relative; appearance: none; margin: 0; transition: background 0.2s; }
  .toggle::after { content: ""; position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: var(--fg); border-radius: 999px; transition: transform 0.2s; }
  .toggle:checked { background: var(--fg); }
  .toggle:checked::after { background: var(--bg); transform: translateX(18px); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="field">
      <div class="label">Email</div>
      <input class="input" type="email" placeholder="prenom@domaine.com">
      <div class="help">Pour les annonces des nouvelles collections.</div>
    </div>
    <div class="field">
      <div class="label">Pays</div>
      <select class="select"><option>Suisse</option><option>France</option><option>Japon</option></select>
      <div class="help">Livraison disponible dans 32 pays.</div>
    </div>
    <div class="field">
      <div class="label">Préférences</div>
      <label class="check"><input type="checkbox" checked> Collaborations Manga</label>
      <label class="check"><input type="checkbox"> Editions numérotées</label>
      <label class="check"><input type="checkbox"> Master Series</label>
    </div>
    <div class="field">
      <div class="label">Mode d'affichage</div>
      <label class="check"><input type="radio" class="radio" name="m" checked> Jour</label>
      <label class="check"><input type="radio" class="radio" name="m"> Nuit</label>
      <label class="check" style="margin-top:6px"><input type="checkbox" class="toggle" checked> Révélation auto</label>
    </div>
  </div>
</body>
</html>
