<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WYP — Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--bg); }
  .wrap { padding: 28px 32px 32px; }
  .tag { display:flex; justify-content:space-between; font-size:10px; letter-spacing:var(--tracking-caps); text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; }
  .display {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 120px;
    line-height: 0.85;
    letter-spacing: -0.015em;
    text-transform: uppercase;
    color: var(--fg);
  }
  .display span { color: var(--fg-mute); }
  .spec { display:flex; gap:32px; margin-top:18px; font-size:10px; letter-spacing:var(--tracking-caps); text-transform:uppercase; color:var(--fg-3); }
  .spec b { color: var(--fg); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag"><span>3.2 · Titre</span><span>BDO Grotesk · Medium · 150 / 120</span></div>
    <div class="display">Watch Your <span>Passion.</span></div>
    <div class="spec">
      <span><b>Size</b> 150pt</span>
      <span><b>Leading</b> 120pt</span>
      <span><b>Tracking</b> 0%</span>
      <span><b>Weight</b> 500</span>
      <span><b>Case</b> UPPER</span>
    </div>
  </div>
</body>
</html>
